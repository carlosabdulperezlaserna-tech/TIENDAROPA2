<!-- OPCIÓN ADMINISTRADOR EN EL MENÚ -->
<li><a href="#" onclick="loginAdmin()">👨‍💼 Administrador</a></li>

<!-- CARRITO -->
<div id="carrito" style="
position:fixed;
right:20px;
top:100px;
width:300px;
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 0 15px rgba(0,0,0,.2);">

    <h2>🛒 Carrito</h2>

    <ul id="lista-carrito"></ul>

    <p>
        <strong>
            Total: S/ <span id="total">0.00</span>
        </strong>
    </p>

    <h3>🚚 Método de Entrega</h3>

    <select id="envio" style="
    width:100%;
    padding:10px;
    border-radius:5px;">

        <option>🚚 Delivery Motorizado</option>
        <option>🏪 Recojo en Tienda</option>
        <option>⚡ Envío Express</option>

    </select>

    <br><br>

    <button onclick="finalizarCompra()"
    style="
    width:100%;
    background:green;
    color:white;
    border:none;
    padding:10px;
    border-radius:5px;">

        Finalizar Compra

    </button>

    <br><br>

    <button onclick="vaciarCarrito()"
    style="
    width:100%;
    background:red;
    color:white;
    border:none;
    padding:10px;
    border-radius:5px;">

        Vaciar Carrito

    </button>

</div>

<!-- PANEL ADMINISTRADOR -->
<div class="admin"
id="panelAdmin"
style="
display:none;
background:white;
margin:40px;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.2);">

    <h2>👨‍💼 Panel Administrador</h2>

    <p>Productos agregados:</p>

    <ul id="admin-lista"></ul>

    <br>

    <p>
        Cantidad total:
        <strong id="cantidad">0</strong>
    </p>

</div>

<script>

let carrito = [];
let total = 0;

/* USUARIO ADMIN */

const usuarioAdmin = "admin";
const claveAdmin = "1234";

/* LOGIN ADMIN */

function loginAdmin(){

    let usuario =
    prompt("Ingrese usuario:");

    let clave =
    prompt("Ingrese contraseña:");

    if(
        usuario === usuarioAdmin &&
        clave === claveAdmin
    ){

        alert("Bienvenido Administrador");

        document
        .getElementById("panelAdmin")
        .style.display = "block";

    }
    else{

        alert(
        "Usuario o contraseña incorrectos"
        );

    }

}

/* AGREGAR PRODUCTOS */

function agregarCarrito(nombre,precio){

    carrito.push({

        nombre:nombre,
        precio:precio

    });

    total += precio;

    actualizar();

}

/* ACTUALIZAR */

function actualizar(){

    let lista =
    document.getElementById(
    "lista-carrito"
    );

    let admin =
    document.getElementById(
    "admin-lista"
    );

    lista.innerHTML = "";
    admin.innerHTML = "";

    carrito.forEach((producto,index)=>{

        let item =
        document.createElement("li");

        item.textContent =
        producto.nombre +
        " - S/ " +
        producto.precio.toFixed(2);

        lista.appendChild(item);

        let adminItem =
        document.createElement("li");

        adminItem.textContent =
        (index+1) +
        ". " +
        producto.nombre +
        " - S/ " +
        producto.precio.toFixed(2);

        admin.appendChild(adminItem);

    });

    document
    .getElementById("total")
    .textContent =
    total.toFixed(2);

    document
    .getElementById("cantidad")
    .textContent =
    carrito.length;

}

/* VACIAR */

function vaciarCarrito(){

    carrito = [];

    total = 0;

    actualizar();

}

/* FINALIZAR COMPRA */

function finalizarCompra(){

    if(carrito.length === 0){

        alert(
        "Tu carrito está vacío"
        );

        return;

    }

    let metodo =
    document.getElementById(
    "envio"
    ).value;

    alert(

        "✅ Compra realizada\n\n" +

        "Método de entrega: " +

        metodo +

        "\n\nTotal: S/ " +

        total.toFixed(2)

    );

    carrito = [];

    total = 0;

    actualizar();

}

</script>
