<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fashion Perú</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f5f5f5;
}

header{
    background:#111;
    color:white;
    padding:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    position:sticky;
    top:0;
    z-index:1000;
}

.logo{
    font-size:28px;
    font-weight:bold;
}

.cart-btn{
    background:#e60023;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

.hero{
    height:60vh;
    background:url('https://images.unsplash.com/photo-1441986300917-64674bd600d8?q=80&w=1600') center/cover;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    text-align:center;
}

.hero h1{
    font-size:50px;
    background:rgba(0,0,0,.5);
    padding:20px;
    border-radius:10px;
}

.productos{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:40px;
}

.card{
    background:white;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 3px 10px rgba(0,0,0,.2);
    transition:.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card img{
    width:100%;
    height:350px;
    object-fit:cover;
}

.info{
    padding:15px;
}

.info h3{
    margin-bottom:10px;
}

.precio{
    color:#e60023;
    font-size:22px;
    font-weight:bold;
}

.btn{
    width:100%;
    padding:12px;
    border:none;
    background:#111;
    color:white;
    margin-top:10px;
    cursor:pointer;
    border-radius:8px;
}

.btn:hover{
    background:#333;
}

.carrito{
    position:fixed;
    top:0;
    right:-450px;
    width:450px;
    height:100%;
    background:white;
    box-shadow:-5px 0 10px rgba(0,0,0,.3);
    transition:.4s;
    padding:20px;
    overflow:auto;
    z-index:2000;
}

.carrito.active{
    right:0;
}

.cerrar{
    float:right;
    font-size:28px;
    cursor:pointer;
}

.item{
    display:flex;
    justify-content:space-between;
    margin:15px 0;
    border-bottom:1px solid #ddd;
    padding-bottom:10px;
}

.total{
    font-size:25px;
    margin-top:20px;
    font-weight:bold;
}

.pagar{
    width:100%;
    background:green;
    color:white;
    border:none;
    padding:15px;
    margin-top:20px;
    border-radius:8px;
    cursor:pointer;
    font-size:18px;
}

footer{
    background:#111;
    color:white;
    text-align:center;
    padding:20px;
}
</style>
</head>
<body>

<header>
    <div class="logo">FASHION PERÚ</div>
    <button class="cart-btn" onclick="abrirCarrito()">
        🛒 Carrito (<span id="contador">0</span>)
    </button>
</header>

<section class="hero">
    <h1>Nueva Colección 2026</h1>
</section>

<section class="productos">

<div class="card">
<img src="https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?w=500" alt="">
<div class="info">
<h3>Vestido Elegante</h3>
<p class="precio">S/ 99</p>
<button class="btn" onclick="agregar('Vestido Elegante',99)">Agregar al carrito</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1521572267360-ee0c2909d518?w=500" alt="">
<div class="info">
<h3>Polo Urbano</h3>
<p class="precio">S/ 59</p>
<button class="btn" onclick="agregar('Polo Urbano',59)">Agregar al carrito</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1541099649105-f69ad21f3246?w=500" alt="">
<div class="info">
<h3>Jeans Premium</h3>
<p class="precio">S/ 89</p>
<button class="btn" onclick="agregar('Jeans Premium',89)">Agregar al carrito</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1483985988355-763728e1935b?w=500" alt="">
<div class="info">
<h3>Chaqueta Moderna</h3>
<p class="precio">S/ 149</p>
<button class="btn" onclick="agregar('Chaqueta Moderna',149)">Agregar al carrito</button>
</div>
</div>

</section>

<div class="carrito" id="carrito">
<span class="cerrar" onclick="cerrarCarrito()">✖</span>

<h2>Mi Carrito</h2>

<div id="lista"></div>

<div class="total">
Total: S/ <span id="total">0</span>
</div>

<button class="pagar" onclick="pagar()">
Pagar Ahora
</button>

</div>

<footer>
© 2026 Fashion Perú - Todos los derechos reservados
</footer>

<script>

let carrito=[];
let total=0;

function agregar(nombre,precio){

carrito.push({
nombre:nombre,
precio:precio
});

total+=precio;

actualizar();
}

function actualizar(){

document.getElementById("contador").innerText=carrito.length;

let lista=document.getElementById("lista");
lista.innerHTML="";

carrito.forEach((producto,index)=>{

lista.innerHTML+=`
<div class="item">
<span>${producto.nombre}</span>
<span>S/ ${producto.precio}</span>
</div>
`;

});

document.getElementById("total").innerText=total;
}

function abrirCarrito(){
document.getElementById("carrito").classList.add("active");
}

function cerrarCarrito(){
document.getElementById("carrito").classList.remove("active");
}

function pagar(){

if(carrito.length===0){
alert("Tu carrito está vacío.");
return;
}

let metodo=prompt(
"Ingrese método de pago:\n\n1. Yape\n2. Plin\n3. Tarjeta"
);

if(metodo){

alert(
"Compra realizada con éxito.\n\nTotal pagado: S/ "+total
);

carrito=[];
total=0;
actualizar();
cerrarCarrito();

}
}

</script>

</body>
</html>
</html>
