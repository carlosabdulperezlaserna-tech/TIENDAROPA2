<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda de Ropa Fashion Style</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            margin:0;
            background:#f4f4f4;
        }

        header{
            background:black;
            color:white;
            text-align:center;
            padding:20px;
        }

        .productos{
            display:flex;
            flex-wrap:wrap;
            justify-content:center;
            gap:20px;
            padding:30px;
        }

        .card{
            background:white;
            width:300px;
            border-radius:10px;
            overflow:hidden;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
        }

        .card img{
            width:100%;
            height:350px;
            object-fit:cover;
        }

        .info{
            padding:15px;
            text-align:center;
        }

        button{
            background:black;
            color:white;
            border:none;
            padding:10px 20px;
            cursor:pointer;
            border-radius:5px;
        }

        button:hover{
            background:#444;
        }
    </style>
</head>
<body>

<header>
    <h1>Fashion Style</h1>
    <p>Las mejores prendas para hombres y mujeres</p>
</header>

<section class="productos">

    <div class="card">
        <img src="https://images.unsplash.com/photo-1521572267360-ee0c2909d518" alt="Polo">
        <div class="info">
            <h2>Polo Casual</h2>
            <p>S/ 59.90</p>
            <button>Comprar</button>
        </div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1541099649105-f69ad21f3246" alt="Jeans">
        <div class="info">
            <h2>Jeans Moderno</h2>
            <p>S/ 89.90</p>
            <button>Comprar</button>
        </div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1483985988355-763728e1935b" alt="Vestido">
        <div class="info">
            <h2>Vestido Elegante</h2>
            <p>S/ 129.90</p>
            <button>Comprar</button>
        </div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1515886657613-9f3515b0c78f" alt="Chaqueta">
        <div class="info">
            <h2>Chaqueta Premium</h2>
            <p>S/ 149.90</p>
            <button>Comprar</button>
        </div>
    </div>

</section>

</body>
</html>
